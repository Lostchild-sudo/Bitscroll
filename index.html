<!DOCTYPE html>
<html>

<head>
  <title>Vocbit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Vocbit</h1>
</header>

<nav>
  <button onclick="showPage('homePage')">Home</button>
  <button onclick="showPage('searchPage')">Search</button>
  <button onclick="showPage('postPage')">Post</button>
  <button onclick="showPage('chatPage')">Chat</button>
  <button onclick="showPage('profilePage')">Profile</button>
</nav>

<main id="app">

<section id="homePage">

<h2>Home Feed</h2>

<div class="post">

<div class="post-header">
<img src="https://via.placeholder.com/40" class="dp">
<span class="username">user_one</span>
</div>

<img src="https://via.placeholder.com/400" class="post-img">

<div class="post-actions">
<button onclick="likePost(this)">❤️ Like</button>
</div>

</div>

</section>
  
<section id="searchPage" style="display:none;">

<h2>Search Users</h2>

<input type="text" id="searchInput" placeholder="Search username..." onkeyup="searchUsers()">

<div id="searchResults"></div>

</section>
  
<section id="postPage" style="display:none;">
<h2>Create Post</h2>
<p>Upload photos or reels here.</p>
</section>

<section id="chatPage" style="display:none;">
<h2>Chats</h2>
<p>Your inbox messages will appear here.</p>
</section>

<section id="profilePage" style="display:none;">

<div class="profile-header">

<img src="https://via.placeholder.com/80" class="profile-dp">

<div class="profile-info">
<h3>Jaspreet Singh</h3>
<p>@jaspreet</p>
<p>This is my bio</p>
<a href="#">mywebsite.com</a>
</div>

</div>

<div class="profile-stats">

<div>
<h4>10</h4>
<p>Posts</p>
</div>

<div>
<h4>200</h4>
<p>Followers</p>
</div>

<div>
<h4>180</h4>
<p>Following</p>
</div>

</div>

<div class="profile-buttons">

<button>Edit Profile</button>
<button>Menu</button>

</div>

<h3>Posts</h3>

<div class="profile-posts">

<img src="https://via.placeholder.com/120">
<img src="https://via.placeholder.com/120">
<img src="https://via.placeholder.com/120">
<img src="https://via.placeholder.com/120">

</div>

</section>
</main>

<script src="script.js"></script>

</body>

</html>
