<!DOCTYPE html>
<html>
<head>
<title>Bitscroll</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- LOGIN PAGE -->

<section id="loginPage">

<h2>Login to Bitscroll</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

</section>



<main style="display:none">

<!-- HOME PAGE -->

<section id="homePage">

<h2>Bitscroll Feed</h2>

<div id="feedPosts"></div>

</section>



<!-- SEARCH PAGE -->

<section id="searchPage" style="display:none">

<h2>Search</h2>

<input type="text" placeholder="Search users" id="searchInput" onkeyup="searchUsers()">

<div id="searchResults"></div>

</section>



<!-- POST PAGE -->

<section id="postPage" style="display:none">

<h2>Create Post</h2>

<input type="file" id="postImage">

<button onclick="uploadPost()">Upload</button>

</section>



<!-- CHAT PAGE -->

<section id="chatPage" style="display:none">

<h2>Chats</h2>

<div id="chatInbox"></div>

<div class="chat-search">

<input type="text" id="userSearch" placeholder="Search users..." onkeyup="searchUsers()">

<div id="chatUserResults"></div>

</div>

<div id="chatHeader">Select a user to start chatting</div>

<div id="chatMessages"></div>

<div class="chat-input">

<input type="text" id="chatText" placeholder="Type a message...">

<button onclick="sendMessage()">Send</button>

</div>

</section>



<!-- PROFILE PAGE -->

<section id="profilePage" style="display:none">

<div class="profile-header">

<h2>Profile</h2>

<i class="fa-solid fa-bars menu-icon" onclick="toggleMenu()"></i>

</div>

<div id="profileMenu" class="profile-menu">

<div onclick="openAccountCenter()">Account Center</div>

<div onclick="openBlocked()">Blocked Users</div>

<div onclick="logout()">Logout</div>

</div>

<img src="https://picsum.photos/80" class="profile-pic">

<div class="profile-right">

<h2 class="username" id="profileUsername">username</h2>

<div class="profile-stats">

<div>
<b id="postCount">0</b>
<span>Posts</span>
</div>

<div>
<b id="followersCount">0</b>
<span>Followers</span>
</div>

<div>
<b id="followingCount">0</b>
<span>Following</span>
</div>

</div>

</div>

</div>


<div class="profile-info">

<b id="profileName">name</b>

<p id="profileBio">bio</p>

<a id="profileLink" href="#" target="_blank">link</a>

</div>



<div class="profile-buttons">

<button onclick="editProfile()">Edit Profile</button>

<button id="followBtn" onclick="toggleFollow()" style="display:none">
Follow
</button>

<button onclick="shareProfile()">Share Profile</button>

</div>



<div class="profile-tabs">

<i class="fa-solid fa-table-cells"></i>

<i class="fa-solid fa-video"></i>

<i class="fa-regular fa-bookmark"></i>

</div>



<div id="profilePosts" class="post-grid"></div>

<div id="editProfileModal" class="modal">

<div class="modal-content">

<h3>Edit Profile</h3>

<input id="editUsername" placeholder="Username">

<input id="editName" placeholder="Name">

<textarea id="editBio" placeholder="Bio"></textarea>

<input id="editLink" placeholder="Website link">

<button onclick="saveProfile()">Save</button>

<button onclick="closeEditProfile()">Cancel</button>

</div>

</div>

</section>


</main>



<!-- BOTTOM NAVIGATION -->

<nav class="bottom-nav">

<i class="fa-solid fa-house" onclick="showPage('homePage')"></i>

<i class="fa-solid fa-magnifying-glass" onclick="showPage('searchPage')"></i>

<i class="fa-solid fa-plus" onclick="showPage('postPage')"></i>

<i class="fa-solid fa-comment" onclick="showPage('chatPage')"></i>

<i class="fa-solid fa-user" onclick="showPage('profilePage')"></i>

</nav>



<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>

<script src="script.js"></script>

</body>
</html>
